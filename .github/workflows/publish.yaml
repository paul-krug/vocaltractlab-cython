name: Publish Python distributions to PyPI

on: 
  release:
    types: [created]

jobs:
  build_wheels:
    name: Build wheel for cp${{ matrix.python }}-${{ matrix.platform_id }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        include:
          # Windows 64-bit
          - os: windows-latest
            python: 310
            platform_id: win_amd64
          - os: windows-latest
            python: 311
            platform_id: win_amd64
          - os: windows-latest
            python: 312
            platform_id: win_amd64
          - os: windows-latest
            python: 313
            platform_id: win_amd64
          - os: windows-latest
            python: 314
            platform_id: win_amd64

          # Linux 64-bit
          - os: ubuntu-latest
            python: 310
            platform_id: manylinux_x86_64
          - os: ubuntu-latest
            python: 311
            platform_id: manylinux_x86_64
          - os: ubuntu-latest
            python: 312
            platform_id: manylinux_x86_64
          - os: ubuntu-latest
            python: 313
            platform_id: manylinux_x86_64
          - os: ubuntu-latest
            python: 314
            platform_id: manylinux_x86_64

          # macOS arm64
          - os: macos-14
            python: 310
            platform_id: macosx_arm64
          - os: macos-14
            python: 311
            platform_id: macosx_arm64
          - os: macos-14
            python: 312
            platform_id: macosx_arm64
          - os: macos-14
            python: 313
            platform_id: macosx_arm64
          - os: macos-14
            python: 314
            platform_id: macosx_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # full history + tags for setuptools_scm (local/sdist path)

      - name: Derive version from release tag
        shell: bash
        run: echo "PKG_VERSION=${TAG#v}" >> "$GITHUB_ENV"
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Build wheels
        env:
          CIBW_BUILD: cp${{ matrix.python }}-${{ matrix.platform_id }}
          # Inject the tag-derived version so setuptools_scm doesn't need git
          # inside the (manylinux) build sandbox. CIBW_ENVIRONMENT forwards it
          # into every build environment, including Linux containers.
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VOCALTRACTLAB_CYTHON=${{ env.PKG_VERSION }}
          # The backend DLL is built by setup.py and copied into
          # vocaltractlab_cython/ (and shipped via package_data). delvewheel
          # vendors the .pyd's dependencies but searches external paths only,
          # so point it at that dir or it fails with "Unable to find library:
          # vocaltractlabapi.dll" (newer delvewheel in cibuildwheel v4 is
          # stricter than v2's, which found it implicitly).
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
            delvewheel repair --add-path vocaltractlab_cython
            -w {dest_dir} {wheel}
        uses: pypa/cibuildwheel@v4.1.0

      - uses: actions/upload-artifact@v4
        with:
          #name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          name: cibw-wheels-cp${{ matrix.python }}-${{ matrix.platform_id }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # full history + tags for setuptools_scm

      - name: Derive version from release tag
        shell: bash
        run: echo "SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VOCALTRACTLAB_CYTHON=${TAG#v}" >> "$GITHUB_ENV"
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    #if: github.event_name == 'release' && github.event.action == 'published'
    # or, alternatively, upload to PyPI on every tag starting with 'v' (remove on: release above to use this)
    # if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1